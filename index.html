<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111318" />
    <meta name="description" content="GENESIS - Kapali Dongu Uzay Tarimi Yasam Destek Sistemi Simulatoru. MELiSSA protokolune dayali biyorejeneratif yasam destek sistemi." />
    <meta name="keywords" content="uzay tarimi, BLSS, MELiSSA, yaşam destek, simulasyon, aeroponik, hidroponik, spirulina, space agriculture" />
    <meta name="author" content="GENESIS Team" />

    <!-- Open Graph -->
    <meta property="og:title" content="GENESIS | Uzay Tarimi Yasam Destek Simulatoru" />
    <meta property="og:description" content="Kapali dongu biyorejeneratif yasam destek sistemi simulatoru — 12 bitki turu, spirulina, mantar, bocek proteini" />
    <meta property="og:type" content="website" />

    <title>GENESIS | Uzay Tarimi Yasam Destek</title>

    <!-- Preload fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      /* Initial loading styles before React mounts */
      body {
        margin: 0;
        padding: 0;
        background-color: #111318;
        color: #c5c6cc;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }
      #root {
        width: 100vw;
        height: 100vh;
      }
      /* Pre-React loading indicator */
      .genesis-preloader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #111318;
        z-index: 9999;
      }
      .genesis-preloader .logo {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        background: #5b8def;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 600;
        color: white;
        margin-bottom: 16px;
      }
      .genesis-preloader .text {
        font-size: 12px;
        color: #6c6e78;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <noscript>Bu uygulamayi calistirmak icin JavaScript'i etkinlestirmeniz gerekiyor.</noscript>
    <div id="root">
      <!-- Pre-React loading indicator (replaced when React mounts) -->
      <div class="genesis-preloader">
        <div class="logo">G</div>
        <div class="text">Genesis</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
